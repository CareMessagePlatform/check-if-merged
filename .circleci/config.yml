version: 2.1
jobs:
  prepare:
    working_directory: ~/repo
    docker:
      - image: cimg/node:20.18
    steps:
      - checkout

      - restore_cache:
          key: node-dependencies-{{ checksum "yarn.lock" }}

      - run: yarn install

      - save_cache:
          key: node-dependencies-{{ checksum "yarn.lock" }}
          paths:
            - node_modules
            - ~/.cache

  setup_and_test:
    working_directory: ~/repo
    docker:
      - image: cimg/node:20.18
        environment:
          COVERAGE: true
    steps:
      - checkout

      - restore_cache:
          key: node-dependencies-{{ checksum "yarn.lock" }}

      - run:
          name: Run Unit Tests
          command: yarn test

workflows:
  prepare_setup_and_test:
    jobs:
      - prepare
      - setup_and_test:
          requires:
            - prepare
